
spring.application.name=crm-system

# Load local .env file if present (project root)
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIG
# ===============================
jwt.secretKey=QmFzZTY0U2VjcmV0S2V5X1ZpZUVtcDNfMjAyNl9TdHJvbmc=
jwt.accessToken.expiration=3600000
jwt.refreshToken.expiration=604800000
